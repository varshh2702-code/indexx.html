<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Hug Line 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffd6e7, #fff0f7, #ffe4ef);
    overflow: hidden;
    position: relative;
    padding: 20px;
}

/* Floating Ambient Background Hearts */
.background-hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

.ambient-heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
    opacity: 0.6;
}

@keyframes floatUp {
    0% { transform: translateY(105vh) scale(1); opacity: 0; }
    20% { opacity: 0.7; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* Connection Card Box - Perfect proportions matching the design */
.connection-card {
    width: 100%;
    max-width: 440px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 32px;
    padding: 45px 35px;
    text-align: center;
    box-shadow: 0 15px 45px rgba(255, 105, 180, 0.12);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

.status-badge {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 7px 18px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.85);
    color: #888;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    transition: all 0.3s ease;
}

.icon-display {
    font-size: 46px;
    margin: 8px 0;
    letter-spacing: 6px;
    text-shadow: 0 4px 10px rgba(255, 182, 193, 0.3);
    animation: pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

h2 { 
    color: #ff4d88; 
    font-size: 1.65rem; 
    font-weight: 600;
    letter-spacing: -0.3px;
}

p { 
    font-size: 13.5px; 
    color: #666; 
    line-height: 1.6; 
    max-width: 300px; 
    margin-bottom: 4px;
}

.action-btn {
    width: 100%;
    max-width: 280px;
    padding: 15px 32px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff77a9, #ff4d88);
    color: white;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 6px 22px rgba(255, 77, 136, 0.35);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.action-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 26px rgba(255, 77, 136, 0.45);
}

.action-btn:disabled {
    background: #e2b3c4;
    box-shadow: none;
    cursor: not-allowed;
}

/* Incoming Banner Popup */
.hug-notification-overlay {
    position: absolute;
    top: -120px;
    width: 88%;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 77, 136, 0.25);
    border-radius: 24px;
    padding: 22px 18px;
    box-shadow: 0 15px 38px rgba(255, 77, 136, 0.22);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.hug-notification-overlay.slide-down {
    transform: translateY(150px);
}

.notification-title { font-size: 15px; font-weight: 700; color: #ff4d88; }
.notification-desc { font-size: 12.5px; color: #444; margin-bottom: 4px; }

/* Dynamic Burst Particle Hearts */
.burst-heart {
    position: fixed;
    pointer-events: none;
    color: #ff4d88;
    z-index: 50;
    animation: burstOut 2s ease-out forwards;
}

@keyframes burstOut {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--scale)); opacity: 0; }
}
</style>
</head>
<body>

<div class="background-hearts" id="ambientContainer"></div>

<div class="hug-notification-overlay" id="hugBanner">
    <div class="notification-title">💓 Hug Received! 💓</div>
    <div class="notification-desc">Your favorite person is squeezing you tight right now!</div>
    <button class="action-btn" style="padding: 6px 20px; font-size: 11px; width: auto;" onclick="dismissAndReturnHug()">Squeeze Back</button>
</div>

<div class="connection-card">
    <div class="status-badge" id="signalStatus">Connecting to pipeline...</div>
    <div class="icon-display" id="mainIcon">🤍💌🤍</div>
    <h2>i wanna hug you rn</h2>
    <p>Keep this separate page open together. Tap below to send an instant warm virtual squeeze directly to his screen.</p>
    <button class="action-btn" id="pingBtn" onclick="transmitLiveHug()">Send a Virtual Hug 💖</button>
</div>

<script>
/* Generate soft floating background elements */
const ambientContainer = document.getElementById('ambientContainer');
for (let i = 0; i < 15; i++) {
    const heart = document.createElement('div');
    heart.classList.add('ambient-heart');
    heart.innerHTML = '💗';
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (14 + Math.random() * 14) + 'px';
    heart.style.animationDuration = (6 + Math.random() * 6) + 's';
    heart.style.animationDelay = Math.random() * 5 + 's';
    ambientContainer.appendChild(heart);
}

/* System Setup Pipeline Constants */
const ROOM_CHANNEL_ID = "dedicated_hug_wire_2026";
const signalStatus = document.getElementById('signalStatus');
const hugBanner = document.getElementById('hugBanner');
const pingBtn = document.getElementById('pingBtn');

// Generates a separate ID to prevent your own phone from triggering its own popups
const deviceFingerprintId = "device_" + Math.floor(Math.random() * 1000000);
const networkStream = new EventSource(`https://pie.ht/stream/${ROOM_CHANNEL_ID}`);

networkStream.onopen = () => {
    signalStatus.innerHTML = "Connected Live • Signal Clear";
    signalStatus.style.color = "#2ecc71";
};

networkStream.onerror = () => {
    signalStatus.innerHTML = "Standby • Reconnecting...";
    signalStatus.style.color = "#777";
};

networkStream.onmessage = (messageEvent) => {
    try {
        const receivedData = JSON.parse(messageEvent.data);
        if (receivedData && receivedData.senderId !== deviceFingerprintId && receivedData.type === "LIVE_HUG") {
            displayIncomingHugEffects();
        }
    } catch (parseError) {}
};

function transmitLiveHug() {
    pingBtn.disabled = true;
    pingBtn.innerHTML = "Sending Squeeze...";

    fetch(`https://pie.ht/stream/${ROOM_CHANNEL_ID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senderId: deviceFingerprintId, type: "LIVE_HUG" })
    })
    .then(() => {
        pingBtn.innerHTML = "Hug Sent! 🥰";
        createVisualHeartBurst(window.innerWidth / 2, window.innerHeight / 2);
        setTimeout(() => {
            pingBtn.innerHTML = "Send a Virtual Hug 💖";
            pingBtn.disabled = false;
        }, 2500);
    })
    .catch(() => {
        pingBtn.innerHTML = "Send a Virtual Hug 💖";
        pingBtn.disabled = false;
    });
}

function displayIncomingHugEffects() {
    hugBanner.classList.add('slide-down');
    let cycles = 0;
    const interval = setInterval(() => {
        const xCoord = Math.random() * window.innerWidth;
        const yCoord = Math.random() * window.innerHeight;
        createVisualHeartBurst(xCoord, yCoord);
        cycles++;
        if (cycles > 4) clearInterval(interval);
    }, 250);
}

function dismissAndReturnHug() {
    hugBanner.classList.remove('slide-down');
    transmitLiveHug();
}

function createVisualHeartBurst(originX, originY) {
    for (let i = 0; i < 12; i++) {
        const particle = document.createElement('div');
        particle.classList.add('burst-heart');
        particle.innerHTML = Math.random() > 0.5 ? '❤️' : '💗';
        
        const targetAngle = Math.random() * Math.PI * 2;
        const distanceOffset = 60 + Math.random() * 120;
        
        const deltaX = Math.cos(targetAngle) * distanceOffset;
        const deltaY = Math.sin(targetAngle) * distanceOffset;
        
        particle.style.left = originX + 'px';
        particle.style.top = originY + 'px';
        particle.style.setProperty('--tx', `${deltaX}px`);
        particle.style.setProperty('--ty', `${deltaY}px`);
        particle.style.setProperty('--scale', 0.6 + Math.random() * 1);
        particle.style.fontSize = (16 + Math.random() * 16) + 'px';
        
        document.body.appendChild(particle);
        setTimeout(() => { particle.remove(); }, 2000);
    }
}
</script>

</body>
</html>
