<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Hug Line 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffd6e7, #fff0f7, #ffe4ef);
    overflow: hidden;
    position: relative;
    padding: 20px;
}

/* Floating Ambient Background Hearts */
.background-hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

.ambient-heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
    opacity: 0.6;
}

@keyframes floatUp {
    0% { transform: translateY(105vh) scale(1); opacity: 0; }
    20% { opacity: 0.7; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* Connection Card Box */
.connection-card {
    width: 100%;
    max-width: 400px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 24px;
    padding: 35px 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.status-badge {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 16px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.7);
    color: #777;
    transition: all 0.3s ease;
}

.icon-display {
    font-size: 45px;
    margin: 10px 0;
    letter-spacing: 5px;
    animation: pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

p { font-size: 13px; color: #555; line-height: 1.5; max-width: 280px; }
